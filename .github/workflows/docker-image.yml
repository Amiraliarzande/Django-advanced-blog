name: Django Project Test
on:
  pull_request:
    branches: [ "main" ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup Docker Compose
      run: docker compose -f docker-compose-stage.yml up -d --build

    - name: Show logs on failure
      if: always()
      run: docker compose -f docker-compose-stage.yml logs backend

    - name: Wait for backend to be healthy
      run: |
        timeout 120 bash -c '
          until [ "$(docker inspect --format="{{.State.Health.Status}}" backend)" = "healthy" ]; do
            echo "Waiting for backend... $(docker inspect --format="{{.State.Health.Status}}" backend)"
            sleep 5
          done
        '

    - name: Run Test
      run: docker compose -f docker-compose-stage.yml exec -T backend sh -c "flake8 && pytest ."

  deploy:
    runs-on: ubuntu-latest
    needs: build
    steps:
    - name: Deploy to VPS
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.HOST }}
        username: ${{ secrets.USERNAME }}
        password: ${{ secrets.PASSWORD }}
        port: ${{ secrets.PORT }}
        script: |
          cd ${{ secrets.PROJECT_PATH }}
          docker compose -f docker-compose-prod.yml stop
          git pull
          docker compose -f docker-compose-prod.yml restart
